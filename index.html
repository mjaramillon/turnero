<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WebAR GitHub Test</title>
    <!-- Cargamos versiones estables de las librerías -->
    <script src="https://aframe.io"></script>
    <script src="https://raw.githack.com"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <!-- La escena debe tener sourceType: webcam explícito -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" vr-mode-ui="enabled: false">
      
      <!-- Marcador HIRO -->
      <a-marker preset="hiro">
        <!-- Cubo animado para confirmar que el renderizado funciona -->
        <a-box position="0 0.5 0" material="color: #4CC3D9; opacity: 0.7;"
               animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"></a-box>
      </a-marker>

      <!-- La cámara es obligatoria -->
      
    </a-scene>

  </body>
</html>
